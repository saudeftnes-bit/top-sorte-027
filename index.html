<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top Sorte - Escolha Seus Números</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            touch-action: pan-y;
            width: 100%;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes selection-pulse {
            0% {
                transform: scale(1.05);
                box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.4);
            }

            70% {
                transform: scale(1.08);
                box-shadow: 0 0 0 10px rgba(147, 51, 234, 0);
            }

            100% {
                transform: scale(1.05);
                box-shadow: 0 0 0 0 rgba(147, 51, 234, 0);
            }
        }

        @keyframes pop-in {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        .animate-selection {
            animation: selection-pulse 2s infinite ease-in-out;
        }

        .animate-pop {
            animation: pop-in 0.3s cubic-bezier(0.26, 0.53, 0.74, 1.48) forwards;
        }

        @keyframes pulse-purple {
            0% {
                box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(147, 51, 234, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(147, 51, 234, 0);
            }
        }

        .animate-button-pulse {
            animation: pulse-purple 2s infinite;
        }

        @keyframes pulse-yellow {
            0% {
                transform: scale(1);
                background-color: #facc15;
            }

            50% {
                transform: scale(1.05);
                background-color: #eab308;
                box-shadow: 0 0 20px rgba(234, 179, 8, 0.5);
            }

            100% {
                transform: scale(1);
                background-color: #facc15;
            }
        }

        .animate-pulse-yellow {
            animation: pulse-yellow 1.5s infinite ease-in-out;
        }

        @keyframes gradient-text {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .animate-gradient-text {
            animation: gradient-text 3s ease infinite;
        }

        @keyframes kenburns {
            0% { transform: scale(1) translate(0, 0); }
            33% { transform: scale(1.12) translate(-1.5%, 1%); }
            66% { transform: scale(1.08) translate(1.5%, -1%); }
            100% { transform: scale(1) translate(0, 0); }
        }
        .animate-kenburns {
            animation: kenburns 10s ease-in-out infinite;
        }

        @keyframes slide-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-slide-progress {
            animation: slide-progress 5s linear forwards;
        }

        @keyframes cta-glow {
            0% { box-shadow: 0 0 15px rgba(251, 191, 36, 0.5), 0 8px 32px rgba(251, 191, 36, 0.3); }
            50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.9), 0 8px 40px rgba(251, 191, 36, 0.6), 0 0 60px rgba(251, 191, 36, 0.3); }
            100% { box-shadow: 0 0 15px rgba(251, 191, 36, 0.5), 0 8px 32px rgba(251, 191, 36, 0.3); }
        }
        .animate-cta-glow {
            animation: cta-glow 2s ease-in-out infinite;
        }

        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.15); opacity: 0; }
        }
        .animate-ring-pulse {
            animation: ring-pulse 1.5s ease-out infinite;
        }
    </style>

{

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

}
</script>

</head>

</html>
